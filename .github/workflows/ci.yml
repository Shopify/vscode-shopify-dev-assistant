name: Run VSCode Extension Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
    - name: Install dependencies
      run: npm install --frozen-lockfile
    - name: Compile
      run: npm run compile
    - name: Run tests
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test
    - name: Run tests
      if: runner.os != 'Linux'
      run: npm test
